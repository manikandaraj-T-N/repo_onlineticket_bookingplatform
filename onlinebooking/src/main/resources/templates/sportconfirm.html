<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport Booking Confirmed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
  <link rel="stylesheet" th:href="@{/css/login.css}" />
  <link rel="stylesheet" th:href="@{/css/sportconfirm.css}" />

</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: booking-menus}"></div>

<div class="confirm-card" style="margin-top:30px;">
    <div class="confirm-top">
        <i class="fa-solid fa-circle-check"></i>
        <h2>Sport Ticket Booked!</h2>
        <p>Your ticket has been successfully booked. Enjoy the match!</p>
    </div>

    <div class="confirm-body">

        <div class="ref-row">
            <span>Booking Reference</span>
            <span class="ref-value">SPT-<span th:text="${booking.id}"></span></span>
        </div>
        <div class="ref-row">
            <span>Booking Date</span>
            <span class="ref-value" th:text="${booking.bookingDate}"></span>
        </div>

        <p class="sec-title">Match Details</p>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-futbol"></i></div>
            <div class="text">
                <h4 th:text="${sport.name}"></h4>
                <p th:text="${sport.category}"></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-users"></i></div>
            <div class="text">
                <h4>Teams</h4>
                <p th:text="${sport.matchTeams}"></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-regular fa-calendar"></i></div>
            <div class="text">
                <h4 th:text="${sport.eventDate}"></h4>
                <p th:text="${sport.eventTime}"></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-location-dot"></i></div>
            <div class="text">
                <h4>Venue</h4>
                <p>
                    <span th:text="${sport.venue}"></span>,
                    <span th:text="${sport.city}"></span>
                </p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-ticket"></i></div>
            <div class="text">
                <h4>Tickets Booked</h4>
                <p th:text="${booking.tickets}"></p>
            </div>
        </div>

        <div class="total-row">
            <span>Total Amount Paid</span>
            <span class="total-price">
                ₹<span th:text="${sport.price * booking.tickets}"></span>
            </span>
        </div>

        <div class="btn-row">
            <a href="/homesports" class="btn-back">← Back to Sports</a>
            <a th:href="@{/sportbooking/download/{id}(id=${booking.id})}" class="btn-download">
                <i class="fa-solid fa-download"></i> Download Ticket
            </a>
        </div>

    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
