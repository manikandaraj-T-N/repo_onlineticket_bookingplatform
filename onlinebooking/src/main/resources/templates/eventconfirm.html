<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Event Booking Confirmed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
         <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/eventconfirm.css}" />

</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: booking-menus}"></div>

<div class="confirm-card" style="margin-top:30px;">
    <div class="confirm-top">
        <i class="fa-solid fa-circle-check"></i>
        <h2>Event Ticket Booked!</h2>
        <p>Your event ticket has been successfully booked. Enjoy the event!</p>
    </div>

    <div class="confirm-body">

        <div class="ref-row">
            <span>Booking Reference</span>
            <span class="ref-value">EVT-<span th:text="${booking.id}"></span></span>
        </div>
        <div class="ref-row">
            <span>Booking Date</span>
            <span class="ref-value" th:text="${booking.bookingDate}"></span>
        </div>

        <p class="sec-title">Event Details</p>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-music"></i></div>
            <div class="text">
                <h4 th:text="${event.name}"></h4>
                <p th:text="${event.category}"></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-regular fa-calendar"></i></div>
            <div class="text">
                <h4 th:text="${event.eventDate}"></h4>
                <p th:text="${event.eventTime}"></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-location-dot"></i></div>
            <div class="text">
                <h4>Venue</h4>
                <p>
                    <span th:text="${event.venue}"></span>,
                    <span th:text="${event.city}"></span>
                </p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-ticket"></i></div>
            <div class="text">
                <h4>Tickets Booked</h4>
                <p th:text="${booking.tickets}"></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-regular fa-user"></i></div>
            <div class="text">
                <h4>Attendee</h4>
                <p>
                    <span th:text="${booking.firstName}"></span>
                    <span th:text="${booking.lastName}"></span>
                </p>
            </div>
        </div>

        <div class="total-row">
            <span>Total Amount Paid</span>
            <span class="total-price">
                ₹<span th:text="${event.price * booking.tickets}"></span>
            </span>
        </div>

        <div class="btn-row">
    <a href="/homeevents" class="btn-back">← Back to Events</a>
    <a th:href="@{/eventbooking/download/{id}(id=${booking.id})}" class="btn-mybookings">
        <i class="fa-solid fa-download"></i> Download Ticket
    </a>
</div>

    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
