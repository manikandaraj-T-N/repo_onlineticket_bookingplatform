<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Booking Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

      <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/eventbookingdetail.css}" />
    
</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: booking-menus}"></div>

<div class="detail-card" style="margin-top:30px;">
    <div class="detail-top">
        <h2><i class="fa-solid fa-calendar-days"></i> Event Booking Details</h2>
        <span th:class="${booking.bookingStatus == 'Confirmed'} ? 'status-badge confirmed' : 'status-badge cancelled'"
              th:text="${booking.bookingStatus}"></span>
    </div>

    <div class="detail-body">
        <div class="ref-section">
            <div class="ref-item">
                <div class="ref-label">Booking Reference</div>
                <div class="ref-value">EVT-<span th:text="${booking.id}"></span></div>
            </div>
            <div class="ref-item">
                <div class="ref-label">Booking Date</div>
                <div class="ref-value" th:text="${booking.bookingDate}"></div>
            </div>
            <div class="ref-item">
                <div class="ref-label">Event Date</div>
                <div class="ref-value" th:text="${event.eventDate}"></div>
            </div>
            <div class="ref-item">
                <div class="ref-label">Event Time</div>
                <div class="ref-value" th:text="${event.eventTime}"></div>
            </div>
        </div>

        <img th:src="@{'/images/homeevents/' + ${event.image}}" class="event-banner" alt="">

        <p class="section-title">Event Info</p>
        <div class="info-grid">
            <div class="info-box">
                <div class="info-label">Event Name</div>
                <div class="info-value" th:text="${event.name}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Category</div>
                <div class="info-value" th:text="${event.category}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Venue</div>
                <div class="info-value" th:text="${event.venue}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">City</div>
                <div class="info-value" th:text="${event.city}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Tickets</div>
                <div class="info-value" th:text="${booking.tickets}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Attendee</div>
                <div class="info-value">
                    <span th:text="${booking.firstName}"></span>
                    <span th:text="${booking.lastName}"></span>
                </div>
            </div>
        </div>

        <div class="price-section">
            <span class="price-label">Total Amount Paid</span>
            <span class="price-value">₹<span th:text="${event.price * booking.tickets}"></span></span>
        </div>

        <div class="btn-row">
            <a href="/mybookings" class="btn-back">← Back to My Bookings</a>
            <a th:href="@{/eventbooking/download/{id}(id=${booking.id})}" class="btn-download">
                <i class="fa-solid fa-download"></i> Download Ticket
            </a>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
