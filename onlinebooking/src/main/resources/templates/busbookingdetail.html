<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Booking Details</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

      <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/busbookingdetail.css}" />

</head>
<body>
<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: booking-menus}"></div>

<div class="detail-card" style="margin-top:30px;">
    <div class="detail-top">
        <h2><i class="fa-solid fa-bus"></i> Bus Booking Details</h2>
        <span th:class="${booking.bookingStatus == 'Confirmed'} ? 'status-badge confirmed' : 'status-badge cancelled'"
              th:text="${booking.bookingStatus}"></span>
    </div>

    <div class="detail-body">
        <div class="ref-section">
            <div class="ref-item">
                <div class="ref-label">Booking Reference</div>
                <div class="ref-value">BUS-<span th:text="${booking.id}"></span></div>
            </div>
            <div class="ref-item">
                <div class="ref-label">Booking Date</div>
                <div class="ref-value" th:text="${booking.bookingDate}"></div>
            </div>
            <div class="ref-item">
                <div class="ref-label">Bus Number</div>
                <div class="ref-value" th:text="${bus.busNumber}"></div>
            </div>
            <div class="ref-item">
                <div class="ref-label">Travel Date</div>
                <div class="ref-value" th:text="${bus.travelDate}"></div>
            </div>
        </div>

        <p class="section-title">Bus Route</p>
        <div class="route-visual">
            <div class="route-point">
                <div class="city" th:text="${bus.fromPlace}"></div>
                <div class="time" th:text="${bus.departureTime}"></div>
                <div class="label">Departure</div>
            </div>
            <div class="route-arrow">
                <div class="line"></div>
                <div class="duration" th:text="${bus.duration}"></div>
            </div>
            <div class="route-point">
                <div class="city" th:text="${bus.toPlace}"></div>
                <div class="time" th:text="${bus.arrivalTime}"></div>
                <div class="label">Arrival</div>
            </div>
        </div>

        <p class="section-title">Bus Info</p>
        <div class="info-grid">
            <div class="info-box">
                <div class="info-label">Bus Name</div>
                <div class="info-value" th:text="${bus.busName}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Bus Type</div>
                <div class="info-value" th:text="${bus.busType}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Seats</div>
                <div class="info-value" th:text="${booking.seats}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Seat Numbers</div>
                <div class="info-value" th:text="${booking.selectedSeats}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Boarding Point</div>
                <div class="info-value" th:text="${booking.boardingPoint}"></div>
            </div>
            <div class="info-box">
                <div class="info-label">Passenger Name</div>
                <div class="info-value">
                    <span th:text="${booking.firstName}"></span>
                    <span th:text="${booking.lastName}"></span>
                </div>
            </div>
        </div>

        <div class="price-section">
            <span class="price-label">Total Amount Paid</span>
            <span class="price-value">₹<span th:text="${bus.price * booking.seats}"></span></span>
        </div>

        <div class="btn-row">
            <a href="/mybookings" class="btn-back">← Back to My Bookings</a>
            <a th:href="@{/busbooking/download/{id}(id=${booking.id})}" class="btn-download">
                <i class="fa-solid fa-download"></i> Download Ticket
            </a>
        </div>
    </div>
</div>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
