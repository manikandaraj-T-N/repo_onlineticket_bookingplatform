<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home|Event Booking</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/homeevents.css}" />


       <!-- ===========owl carousel css======== -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.carousel.min.css" integrity="sha512-tS3S5qG0BlhnQROyJXvNjeEM4UpMXHrQfTGmbQ1gKmelCxlSEBUaxhRBj/EFTzpbP4RVSrpEikbmdJobCvhE3g==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/assets/owl.theme.default.css" integrity="sha512-OTcub78R3msOCtY3Tc6FzeDJ8N9qvQn1Ph49ou13xgA9VsH9+LRxoFU6EqLhW4+PKRfU+/HReXmSZXHEkpYoOA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    </head>

    <body>
        <!-- navbar -->
        <div th:replace="fragments :: navbar"></div>

     <div th:replace="fragments :: booking-menus"></div>



      <!-- ============banner=========== -->
<section class="banner">

    <div class="banner-img">
        <img th:src="@{/images/homeevents/home-event-banner.png}" alt="">
    </div>

    <div class="overlay-text">
       <h1>Discover Amazing Events</h1>
        <p>Concerts, comedy shows, festivals, tech summits and more</p>
    </div>

        <!-- FORM-->
        <div class="form">
    <form action="/flights" method="get">

        <input type="text" name="event" placeholder="Event Name" required>
        <input type="text" name="location" placeholder="Location" required>
        <button type="submit">Find Event</button>

    </form>
</div>

</section>


<!-- ===========================MAIN========================== -->
<section class="event-section">

    <!-- FILTERS -->
    <div class="event-filters">
        <div class="event-filter-header">
            <h2>Filters</h2>
        </div>

        <form action="/events" method="get">

            <!-- Price Range -->
            <div class="event-filter-group">
                <div class="event-filter-label" onclick="toggleEventFilter('price')">
                    <h3>Price Range</h3>
                    <i class="fa-solid fa-chevron-up" id="icon-price"></i>
                </div>
                <div class="event-filter-content" id="price">
                    <input type="range" id="maxPrice" min="100" max="900" value="900">
                    <input type="hidden" id="maxPriceHidden" name="maxPrice" value="900">
                    <div class="price-range-labels">
                        <span>₹100</span>
                        <span>₹<span id="maxVal">900</span></span>
                    </div>
                </div>
            </div>

            <!-- Category -->
            <div class="event-filter-group">
                <div class="event-filter-label" onclick="toggleEventFilter('category')">
                    <h3>Category</h3>
                    <i class="fa-solid fa-chevron-up" id="icon-category"></i>
                </div>
                <div class="event-filter-content" id="category">
                    <label class="event-check">
                        <input type="checkbox" name="category" value="Music"> Music
                    </label>
                    <label class="event-check">
                        <input type="checkbox" name="category" value="Comedy"> Comedy
                    </label>
                    <label class="event-check">
                        <input type="checkbox" name="category" value="Theatre"> Theatre
                    </label>
                    <label class="event-check">
                        <input type="checkbox" name="category" value="Festival"> Festival
                    </label>
                    <label class="event-check">
                        <input type="checkbox" name="category" value="Tech"> Tech
                    </label>
                    <label class="event-check">
                        <input type="checkbox" name="category" value="Food"> Food
                    </label>
                </div>
            </div>

            <!-- City -->
            <div class="event-filter-group">
                <div class="event-filter-label" onclick="toggleEventFilter('city')">
                    <h3>City</h3>
                    <i class="fa-solid fa-chevron-down" id="icon-city"></i>
                </div>
                <div class="event-filter-content hidden" id="city">
                    <label class="event-radio">
                        <input type="radio" name="city" value="all" checked> All
                    </label>
                    <label class="event-radio">
                        <input type="radio" name="city" value="Chennai"> Chennai
                    </label>
                    <label class="event-radio">
                        <input type="radio" name="city" value="Bangalore"> Bangalore
                    </label>
                    <label class="event-radio">
                        <input type="radio" name="city" value="Hyderabad"> Hyderabad
                    </label>
                    <label class="event-radio">
                        <input type="radio" name="city" value="Delhi"> Delhi
                    </label>
                    <label class="event-radio">
                        <input type="radio" name="city" value="Mumbai"> Mumbai
                    </label>
                </div>
            </div>

            <button type="submit" class="apply-btn">Apply Filters</button>
        </form>
    </div>

    <!-- ===================EVENT CARDS================= -->
    <div class="event-cards-section">

        <div class="event-tabs">
        <button class="event-tab-btn active" onclick="filterTab('All', this)">All</button>
        <button class="event-tab-btn" onclick="filterTab('Music', this)">Music</button>
        <button class="event-tab-btn" onclick="filterTab('Comedy', this)">Comedy</button>
        <button class="event-tab-btn" onclick="filterTab('Workshop', this)">Workshop</button>
        <button class="event-tab-btn" onclick="filterTab('Food Festival', this)">Food</button>
        <button class="event-tab-btn" onclick="filterTab('Cultural', this)">Cultural</button>
    </div>


        <div class="event-cards">

            <div class="event-card" th:each="event : ${events}" th:data-category="${event.category}">
                <div class="event-img">
                    <img th:src="@{'/images/homeevents/' + ${event.image}}" alt="">
                    <div class="event-category-badge" th:text="${event.category}"></div>
                     <h3 class="event-img-title" th:text="${event.name}"></h3> 
                </div>
                <div class="event-info">
                    <h3 th:text="${event.name}"></h3>
                    <div class="event-detail">
                        <i class="fa-regular fa-calendar"></i>
                        <span th:text="${event.eventDate}"></span>
                    </div>
                    <div class="event-detail">
                        <i class="fa-regular fa-clock"></i>
                        <span th:text="${event.eventTime}"></span>
                    </div>
                    <div class="event-detail">
                        <i class="fa-solid fa-location-dot"></i>
                        <span th:text="${event.venue + ', ' + event.city}"></span>
                    </div>
                    <div class="event-card-bottom">
                        <span class="event-price">₹<span th:text="${event.price}"></span></span>
                        <a th:href="@{/eventbooking/{id}(id=${event.id})}" class="event-book-btn">
                            Book Now
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>



      <!-- ==================cta========== -->
<div class="cta-1">
<section class="cta">
    <div class="overlay"></div>

    <div class="cta-content">
        <h1>Ready to Book Your Next Experience?</h1>
        <p>
            Discover flights, sports events, movies, concerts, and activities — 
            all in one place with TicketVerse.
        </p>

        <div class="buttons">
            <button class="btn primary">Find Tickets</button>
            <button class="btn secondary">Explore Categories</button>
        </div>
    </div>
</section>
</div>

           <!-- =============footer ======================-->
        <div th:replace="fragments :: footer"></div>


          <!-- scripts -->
<!-- ===========owl carousel======== -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js" integrity="sha512-bPs7Ae6pVvhOSiIcyUClR7/q2OAsRiovw4vAkX+zJbw3ShAeeqezq50RIIcIURq7Oa20rW2n2q+fyXBNcU9lrw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

 <script th:src="@{/js/owl.js}"></script>


<script>
    function filterTab(category, el) {
    // update active tab
    document.querySelectorAll('.event-tab-btn').forEach(btn => btn.classList.remove('active'));
    el.classList.add('active');

    // filter cards
    document.querySelectorAll('.event-card').forEach(card => {
        if (category === 'All' || card.dataset.category === category) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
}

function toggleEventFilter(id) {
    const content = document.getElementById(id);
    const icon = document.getElementById('icon-' + id);
    content.classList.toggle('hidden');
    icon.classList.toggle('fa-chevron-down');
    icon.classList.toggle('fa-chevron-up');
}

const maxRange = document.getElementById('maxPrice');
const maxVal = document.getElementById('maxVal');
const maxHidden = document.getElementById('maxPriceHidden');

maxRange.addEventListener('input', () => {
    maxVal.innerText = parseInt(maxRange.value).toLocaleString();
    maxHidden.value = maxRange.value;
});

</script>


    </body>

    </html>
