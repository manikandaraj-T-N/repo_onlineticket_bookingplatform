<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Train</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

      <link rel="stylesheet" th:href="@{/css/login.css}" />
       <link rel="stylesheet" th:href="@{/css/trainbooking.css}" />

  
</head>
<body>

  <!-- navbar -->
        <div th:replace="fragments :: navbar"></div>

     <div th:replace="fragments :: booking-menus"></div>


<div class="book-banner">Book Your Train Ticket</div>

<div class="booking-layout">

    <!-- ==========PASSENGER FORM=========== -->
    <div class="passenger-box">
        <div class="box-header">Passenger Info</div>
        <div class="box-body">
            
            <form id="bookingForm" th:action="@{/trainbooking/confirm}" method="post">

                <input type="hidden" name="trainId" th:value="${train.id}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"> 

                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <div class="input-wrap">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" name="firstName" placeholder="First Name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <div class="input-wrap">
                            <i class="fa-regular fa-user"></i>
                            <input type="text" name="lastName" placeholder="Last Name" required>
                        </div>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Phone</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-phone"></i>
                            <input type="tel" name="phone" placeholder="Phone Number" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Number of Passengers</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-users"></i>
                            <input type="number" name="passengers" min="1" max="6" value="1" required>
                        </div>
                    </div>
                </div>

                <p class="section-title">Seat Preference</p>

                <div class="form-row">
                    <div class="form-group">
                        <label>Seat Class</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-chair"></i>
                            <select name="seatClass" required>
                                <option value="" disabled selected>Select Class</option>
                                <option value="Sleeper">Sleeper</option>
                                <option value="3AC">3AC</option>
                                <option value="2AC">2AC</option>
                                <option value="1AC">1AC</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Berth Preference</label>
                        <div class="input-wrap">
                            <i class="fa-solid fa-bed"></i>
                            <select name="berth">
                                <option value="No Preference">No Preference</option>
                                <option value="Lower">Lower</option>
                                <option value="Middle">Middle</option>
                                <option value="Upper">Upper</option>
                                <option value="Side Lower">Side Lower</option>
                                <option value="Side Upper">Side Upper</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="button" class="submit-btn" onclick="openPayment()">Continue to Payment →</button>

            </form>
        </div>
    </div>

    <!-- TRAIN INFO -->
    <div class="booking-info-box">
        <div class="box-header">Train Info</div>

        <div class="info-row">
            <span class="label"><i class="fa-solid fa-train"></i> Train</span>
            <span class="value" th:text="${train.trainName}"></span>
        </div>

        <div class="info-row">
            <span class="label">Train No</span>
            <span class="value" th:text="${train.trainNumber}"></span>
        </div>

        <div class="info-row">
            <span class="label">Type</span>
            <span class="value" th:text="${train.trainType}"></span>
        </div>

        <div class="info-row">
            <span class="label"><i class="fa-regular fa-clock"></i> Duration</span>
            <span class="value" th:text="${train.duration}"></span>
        </div>

        <div class="info-route">
            <div class="route-line">
                <span th:text="${train.fromPlace}"></span>
                <i class="fa-solid fa-arrow-right" style="color:#e8412a"></i>
                <span th:text="${train.toPlace}"></span>
            </div>
            <div class="route-times">
                <span th:text="${train.departureTime}"></span>
                <span th:text="${train.arrivalTime}"></span>
            </div>
        </div>

        <div class="info-row">
            <span class="label">Date</span>
            <span class="value" th:text="${train.travelDate}"></span>
        </div>

        <div class="price-row">
            <span class="total-label">Starting Price</span>
            <span class="total-price">₹<span th:text="${train.price}"></span></span>
        </div>
    </div>

</div>

<div th:replace="fragments :: footer"></div>

<!--============= Payment Modal================ -->
<div class="modal-overlay" id="paymentModal">
    <div class="modal-box">
        <button class="modal-close" onclick="closePayment()">
            <i class="fa-solid fa-circle-xmark"></i>
        </button>

        <div class="modal-left">
            <div class="pay-method active" onclick="switchMethod(this, 'credit')">Credit Card</div>
            <div class="pay-method" onclick="switchMethod(this, 'netbanking')">Net Banking</div>
            <div class="pay-method" onclick="switchMethod(this, 'upi')">UPI</div>
        </div>

        <div class="modal-divider"></div>

        <div class="modal-right">
            <!-- Credit Card -->
            <div class="pay-form active" id="credit">
                <div class="pay-field">
                    <label>Card Number<span>*</span></label>
                    <input type="text" placeholder="0000 0000 0000 0000" maxlength="19" id="cardNumber">
                </div>
                <div class="pay-row">
                    <div class="pay-field">
                        <label>Expiry Date<span>*</span></label>
                        <input type="text" placeholder="MM/YYYY" maxlength="7" id="expiry">
                    </div>
                    <div class="pay-field">
                        <label>CVV<span>*</span></label>
                        <input type="text" placeholder="000" maxlength="3" id="cvv">
                    </div>
                </div>
            </div>

            <!-- Net Banking -->
            <div class="pay-form" id="netbanking">
                <div class="pay-field">
                    <label>Select Bank<span>*</span></label>
                    <select>
                        <option value="" disabled selected>Choose your bank</option>
                        <option>SBI</option>
                        <option>HDFC</option>
                        <option>ICICI</option>
                        <option>Axis Bank</option>
                        <option>Kotak</option>
                    </select>
                </div>
                <div class="pay-field">
                    <label>User ID<span>*</span></label>
                    <input type="text" placeholder="Enter Net Banking User ID">
                </div>
            </div>

            <!-- UPI -->
            <div class="pay-form" id="upi">
                <div class="pay-field">
                    <label>UPI ID<span>*</span></label>
                    <input type="text" placeholder="yourname@upi">
                </div>
            </div>

            <button class="pay-now-btn" onclick="submitPayment()">Pay Now</button>
        </div>
    </div>
</div>

<script>
    function openPayment() {
    const form = document.getElementById('bookingForm');
    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }
    document.getElementById('paymentModal').classList.add('open');
}

function closePayment() {
    document.getElementById('paymentModal').classList.remove('open');
}

function switchMethod(el, id) {
    document.querySelectorAll('.pay-method').forEach(m => m.classList.remove('active'));
    document.querySelectorAll('.pay-form').forEach(f => f.classList.remove('active'));
    el.classList.add('active');
    document.getElementById(id).classList.add('active');
}

function submitPayment() {
    const activeForm = document.querySelector('.pay-form.active');
    const inputs = activeForm.querySelectorAll('input, select');
    let valid = true;
    inputs.forEach(input => {
        if (input.value.trim() === '') {
            input.style.border = '1.5px solid red';
            valid = false;
        } else {
            input.style.border = '1px solid #ddd';
        }
    });
    if (!valid) return;
    document.getElementById('bookingForm').submit();
}


</script>


</body>
</html>
