<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Booking Confirmed</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">


      <link rel="stylesheet" th:href="@{/css/login.css}" />
    <link rel="stylesheet" th:href="@{/css/trainconfirm.css}" />
</head>
<body>

<div th:replace="~{fragments :: navbar}"></div>
<div th:replace="~{fragments :: booking-menus}"></div>

<div class="confirm-card" style="margin-top: 30px;">
    <div class="confirm-top">
        <i class="fa-solid fa-circle-check"></i>
        <h2>Train Booked!</h2>
        <p>Your train ticket has been successfully booked. Have a safe journey!</p>
    </div>

    <div class="confirm-body">

        <div class="ref-row">
            <span>Booking Reference</span>
            <span class="ref-value">TRN-<span th:text="${booking.id}"></span></span>
        </div>
        <div class="ref-row">
            <span>Booking Date</span>
            <span class="ref-value" th:text="${booking.bookingDate}"></span>
        </div>

        <p class="sec-title">Journey Details</p>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-train"></i></div>
            <div class="text">
                <h4 th:text="${train.trainName}"></h4>
                <p>Train No: <span th:text="${train.trainNumber}"></span></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-location-dot"></i></div>
            <div class="text">
                <h4>Route</h4>
                <p>
                    <span th:text="${train.fromPlace}"></span>
                    → <span th:text="${train.toPlace}"></span>
                </p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-regular fa-calendar"></i></div>
            <div class="text">
                <h4 th:text="${train.travelDate}"></h4>
                <p>
                    <span th:text="${train.departureTime}"></span>
                    - <span th:text="${train.arrivalTime}"></span>
                </p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-chair"></i></div>
            <div class="text">
                <h4>Seat Class</h4>
                <p th:text="${booking.seatClass}"></p>
            </div>
        </div>

        <div class="detail-item">
            <div class="icon"><i class="fa-solid fa-users"></i></div>
            <div class="text">
                <h4>Passengers</h4>
                <p th:text="${booking.passengers}"></p>
            </div>
        </div>

        <div class="total-row">
            <span>Total Amount Paid</span>
            <span class="total-price">₹<span th:text="${train.price * booking.passengers}"></span></span>
        </div>

        <div class="btn-row">
             <a th:href="@{/trainbooking/download/{id}(id=${booking.id})}" class="btn-download">
            <i class="fa-solid fa-download"></i> Download Ticket
            </a>
            <a href="/hometrain" class="btn-back">← Back to Trains</a>
           
        </div>

    </div>
</div>

<div th:replace="~{fragments :: footer}"></div>

</body>
</html>
